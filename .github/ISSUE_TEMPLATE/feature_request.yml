name: 功能请求
description: 建议一个新功能或改进
title: "[Feature] "
labels: ["enhancement"]
body:
  - type: textarea
    id: problem
    attributes:
      label: 要解决的问题
      description: 你遇到了什么问题，或希望达成什么目标？
    validations:
      required: true
  - type: textarea
    id: solution
    attributes:
      label: 期望的方案
    validations:
      required: true
  - type: textarea
    id: alternatives
    attributes:
      label: 考虑过的替代方案
    validations:
      required: false
