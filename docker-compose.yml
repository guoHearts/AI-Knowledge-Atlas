services:
  neo4j:
    image: neo4j:5-community
    ports:
      - "7474:7474"
      - "7687:7687"
    environment:
      NEO4J_AUTH: neo4j/${NEO4J_PASSWORD:-ai-knowledge-graph}
      NEO4J_PLUGINS: '["apoc"]'
    volumes:
      - neo4j_data:/data
      - neo4j_logs:/logs
    healthcheck:
      test: ["CMD-SHELL", "cypher-shell -u neo4j -p ${NEO4J_PASSWORD:-ai-knowledge-graph} 'RETURN 1' >/dev/null 2>&1"]
      interval: 5s
      timeout: 5s
      retries: 30

  backend:
    build:
      context: ./backend
      dockerfile: ../Dockerfile.backend
    ports:
      - "8000:8000"
    environment:
      NEO4J_URI: bolt://neo4j:7687
      NEO4J_USER: ${NEO4J_USER:-neo4j}
      NEO4J_PASSWORD: ${NEO4J_PASSWORD:-ai-knowledge-graph}
      LLM_MODEL: ${LLM_MODEL:-gpt-4o}
      LLM_API_KEY: ${LLM_API_KEY}
      LLM_BASE_URL: ${LLM_BASE_URL}
      ENABLE_SCHEDULER: ${ENABLE_SCHEDULER:-false}
    depends_on:
      neo4j:
        condition: service_healthy
    volumes:
      - ./backend:/app

  # Next.js frontend
  nextjs:
    build:
      context: ./nextjs-frontend
      dockerfile: ../Dockerfile.nextjs
    ports:
      - "3000:3000"
    environment:
      NEXT_PUBLIC_API_URL: ${VITE_API_URL:-http://localhost:8000}
      DATABASE_PATH: /app/data/learning.db
    depends_on:
      - backend
    volumes:
      - ./nextjs-frontend:/app
      - /app/node_modules
      - nextjs_data:/app/data

volumes:
  neo4j_data:
  neo4j_logs:
  nextjs_data:
